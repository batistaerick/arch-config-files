source = ~/.config/hypr/theme-env.conf

################
### MONITORS ###
################

# Monitors
monitorv2 {
    output = DP-3
    mode = 2560x1080@144
    position = 0x0
    scale = 1
}
monitorv2 {
    output = HDMI-A-1
    mode = 1920x1080@144
    position = 320x1080
    scale = 1
}
render {
    cm_fs_passthrough = true
}
DXVK_HDR=1 gamescope -W 2560 -H 1080 -r 144 -f --hdr-enabled -- %command%

###################
### MY PROGRAMS ###
###################

$menu = wofi --show drun
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun

#################
### AUTOSTART ###
#################

exec-once = blueman-applet
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = hyprpaper
exec-once = hyprsunset
exec-once = swayosd-server
exec-once = rm -f ~/.cache/cliphist/db
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_MENU_PREFIX,arch-
env = _JAVA_AWT_WM_NONREPARENTING,1

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 7
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 5
    rounding_power = 5
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.2
    }
}

animations {
    enabled = yes, please :)
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    focus_on_activate = true
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, return, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, E, exec, $fileManager --new-window
bind = $mainMod, T, togglefloating,
bind = $mainMod, T, pin
bind = $mainMod, P, pseudo,
bind = $mainMod, A, togglesplit,
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy && wtype -M ctrl v -m ctrl

# Move focus with mainMod + arrow keys
bind = $mainMod, j, movefocus, l  # (Left)
bind = $mainMod, k, movefocus, d  # (Down)
bind = $mainMod, i, movefocus, u  # (Up)
bind = $mainMod, l, movefocus, r  # (Right)

# Resizes by 10 pixels. Change the numbers for faster/slower resizing.
bind = $mainMod SHIFT, j, resizeactive, -15 0   # Decrease width (Left)
bind = $mainMod SHIFT, k, resizeactive, 0 15    # Increase height (Down)
bind = $mainMod SHIFT, i, resizeactive, 0 -15   # Decrease height (Up)
bind = $mainMod SHIFT, l, resizeactive, 15 0    # Increase width (Right)

bind = $mainMod CTRL, j, movewindow, l   # Decrease width (Left)
bind = $mainMod CTRL, k, movewindow, d   # Increase height (Down)
bind = $mainMod CTRL, i, movewindow, u   # Decrease height (Up)
bind = $mainMod CTRL, l, movewindow, r   # Increase width (Right)

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod CTRL, S, movetoworkspace, 1

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Scripts
bind = $mainMod, PRINT, exec, ~/.config/wofi/scripts/actions/screenshot-selection.sh
bind = , PRINT, exec, ~/.config/wofi/scripts/actions/screenshot-full.sh
bind = $mainMod SHIFT, space, exec, ~/.config/wofi/scripts/actions/toggle-waybar.sh
bind = $mainMod, N, exec, ~/.config/wofi/scripts/actions/next-wallpaper.sh
bind = $mainMod CTRL, SPACE, exec, ~/.config/wofi/scripts/menus/wallpaper.sh
bind = $mainMod, space, exec, ~/.config/wofi/scripts/menus/main.sh
bind = $mainMod, F, exec, ~/.config/wofi/scripts/menus/search.sh
bind = $mainMod, G, exec, ~/.config/wofi/scripts/actions/google-search.sh

# hyprpicker
bind = $mainMod, equal, exec, hyprpicker -a

# hyprlock
bind = $mainMod, m, exec, hyprlock

# Characters
bind = $mainMod, SEMICOLON, exec, gnome-characters

# Toggle play/pause/next for the active media player
bind = , F8, exec, playerctl play-pause
bind = , F9, exec, playerctl next

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume=2 --max-volume=100
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume=-2 --max-volume=100
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume=mute-toggle --max-volume=100

bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 2%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 2%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# DP-3 (Main) gets: 1, 3
workspace = 1, monitor:DP-3
workspace = 3, monitor:DP-3
# HDMI-A-1 (Secondary) gets: 2, 4
workspace = 2, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1

# Bluetooth Manager
windowrule {
    name = blueman-manager-float
    match:class = ^(blueman-manager)$
    float = true
    center = true
    size = 700 500
}

# Pavucontrol
windowrule {
    name = pavucontrol-float
    match:class = ^(org.pulseaudio.pavucontrol)$
    float = true
    center = true
    size = 700 500
}

# GNOME Calculator
windowrule {
    name = gnome-calculator-float
    match:class = ^(org.gnome.Calculator)$
    float = true
    center = true
    size = 420 560
}

# GNOME Character Map / Characters
windowrule {
    name = gnome-characters-float
    match:class = ^(org.gnome.Characters)$
    float = true
    center = true
    size = 700 500
}

# Dolphin transparency
windowrule {
  name = set-dolphin-transparency
  match:class = ^(org.kde.dolphin)$
  opacity = 1 0.94
}

# Google Chrome transparency
windowrule {
  name = set-google-chrome-transparency
  match:class = ^(google-chrome)$
  opacity = 1 0.96
}

# VSCode transparency
windowrule {
  name = set-vscode-transparency
  match:class = ^(code)$
  opacity = 1 0.94
}

# IntelliJ transparency
windowrule {
  name = set-intellij-transparency
  match:class = ^(jetbrains-.*)$
  opacity = 1 0.94
}

# IntelliJ Focus
windowrule {
    name = jetbrains-no-focus-steal
    match:class = ^(jetbrains-.*)$
    no_initial_focus = true
}

# Ignore maximize requests from all apps. You'll probably like this.
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
