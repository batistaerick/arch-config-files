general {
    immediate_render = true
}

background {
    monitor = 
    path = screenshot
    color = rgba(0, 0, 0, 0.5)
    blur_passes = 2
    blur_size = 6
    noise = 0.01
}

input-field {
    monitor = 
    size = 100, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = none
    inner_color = none
    font_color = rgb(ffffff)
    placeholder_text = 
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    check_color = rgb(90c17a)
    fail_color = rgb(e06c75)
    position = 0, -50
    halign = center
    valign = center
}

label {
    monitor = 
    text = cmd[update:1000] echo "$(date +'%I:%M:%S %p')"
    font_size = 58
    font_family = sans-serif
    color = rgba(ffffffcc)
    position = 0, 150
    halign = center
    valign = center
}